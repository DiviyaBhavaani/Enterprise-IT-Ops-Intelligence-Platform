[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    notebooks,
    .venv,
    venv
per-file-ignores =
    __init__.py: F401
    config.py: F401

[isort]
profile         = black
line_length     = 100
known_first_party = config,data,models,rag,dashboard,tests

[mypy]
python_version  = 3.11
ignore_missing_imports = True
warn_unused_ignores    = True

[tool:pytest]
testpaths = tests
